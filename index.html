<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>QA Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #060b14; font-family: 'Sora', sans-serif; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: #060b14; }
::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 2px; }
@keyframes spin { to { transform: rotate(360deg); } }
.spin { animation: spin 1s linear infinite; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.fadeUp { animation: fadeUp 0.3s ease forwards; }
textarea:focus, input:focus { border-color: #00d4ff !important; outline: none; }
button:active { opacity: 0.8; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState, useEffect, useRef } = React;

const API_KEY_STORAGE = "qa_explorer_key";

const KNOWN_APPS = [
  { id: "kraken",   name: "Kraken",   type: "crypto_financial", emoji: "🔐" },
  { id: "coinbase", name: "Coinbase", type: "crypto_financial", emoji: "💰" },
  { id: "surfline", name: "Surfline", type: "media_content",    emoji: "🌊" },
  { id: "jibjab",   name: "JibJab",   type: "entertainment",    emoji: "🎭" },
  { id: "wpt",      name: "WPT",      type: "gaming",           emoji: "🃏" },
  { id: "custom",   name: "Outro...", type: "custom",           emoji: "📱" },
];

const PLATFORMS = [
  { id: "ios",     label: "iOS" },
  { id: "android", label: "Android" },
  { id: "web",     label: "Web" },
];

const FOCUS_AREAS = [
  { id: "all",          label: "Geral" },
  { id: "auth",         label: "Login & Auth" },
  { id: "transactions", label: "Transações" },
  { id: "ui",           label: "Interface" },
  { id: "security",     label: "Segurança" },
];

const S = {
  root: { fontFamily:"'Sora',sans-serif", background:"#060b14", minHeight:"100vh", color:"#e0e0e0", padding:"20px 16px 40px", maxWidth:"620px", margin:"0 auto", display:"flex", flexDirection:"column", gap:"14px" },
  hdr: { textAlign:"center", paddingBottom:"4px" },
  logo: { display:"flex", alignItems:"center", justifyContent:"center", gap:"10px", marginBottom:"6px" },
  logoMark: { fontSize:"26px", color:"#00d4ff", fontFamily:"'JetBrains Mono',monospace" },
  logoTxt: { fontSize:"22px", fontWeight:"700", color:"#fff", fontFamily:"'JetBrains Mono',monospace", letterSpacing:"-0.5px" },
  tagline: { fontSize:"10px", color:"#6b7a8d", letterSpacing:"2px", fontFamily:"'JetBrains Mono',monospace" },
  card: { background:"#0d1424", border:"1px solid #1e3a5f", borderRadius:"12px", padding:"18px", display:"flex", flexDirection:"column", gap:"18px" },
  sec: { display:"flex", flexDirection:"column", gap:"10px" },
  lbl: { fontSize:"10px", letterSpacing:"2px", color:"#00d4ff", fontFamily:"'JetBrains Mono',monospace", fontWeight:"600" },
  appGrid: { display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:"8px" },
  appBtn: { background:"#111d2e", border:"1px solid #1e3a5f", borderRadius:"8px", padding:"10px 6px", color:"#8899aa", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:"5px", fontFamily:"'Sora',sans-serif" },
  appBtnOn: { background:"#0a2040", border:"1px solid #00d4ff", color:"#fff", boxShadow:"0 0 12px rgba(0,212,255,.2)" },
  inp: { background:"#111d2e", border:"1px solid #1e3a5f", borderRadius:"8px", padding:"10px 14px", color:"#e0e0e0", fontSize:"14px", fontFamily:"'Sora',sans-serif", outline:"none", width:"100%" },
  chips: { display:"flex", flexWrap:"wrap", gap:"8px" },
  chip: { background:"#111d2e", border:"1px solid #1e3a5f", borderRadius:"20px", padding:"6px 14px", color:"#8899aa", cursor:"pointer", fontSize:"12px", fontFamily:"'Sora',sans-serif" },
  chipOn: { background:"#0a2040", border:"1px solid #00d4ff", color:"#00d4ff" },
  errBox: { background:"rgba(255,71,87,.1)", border:"1px solid #ff4757", borderRadius:"8px", padding:"10px 14px", color:"#ff4757", fontSize:"13px" },
  startBtn: { background:"linear-gradient(135deg,#00d4ff,#0084cc)", border:"none", borderRadius:"8px", padding:"14px", color:"#000", fontSize:"12px", fontWeight:"700", letterSpacing:"2px", fontFamily:"'JetBrains Mono',monospace", cursor:"pointer" },
  hint: { textAlign:"center", fontSize:"12px", color:"#4a5a6a", lineHeight:"1.5" },
  spinner: { width:"36px", height:"36px", border:"3px solid #1e3a5f", borderTopColor:"#00d4ff", borderRadius:"50%" },
  topBar: { display:"flex", alignItems:"center", justifyContent:"space-between", background:"#0d1424", border:"1px solid #1e3a5f", borderRadius:"10px", padding:"12px 16px" },
  timerDisp: { fontSize:"22px", fontFamily:"'JetBrains Mono',monospace", color:"#00d4ff", fontWeight:"600", letterSpacing:"2px" },
  progTrack: { height:"3px", background:"#1e3a5f", borderRadius:"2px", overflow:"hidden" },
  progFill: { height:"100%", background:"linear-gradient(90deg,#00d4ff,#0084cc)", borderRadius:"2px", transition:"width .3s ease" },
  overviewBox: { background:"rgba(0,212,255,.05)", border:"1px solid rgba(0,212,255,.2)", borderRadius:"8px", padding:"12px 14px", fontSize:"13px", color:"#b0c0d0", lineHeight:"1.5", display:"flex", alignItems:"flex-start", gap:"6px" },
  aTab: { display:"flex", alignItems:"center", justifyContent:"space-between", background:"#0d1424", border:"1px solid #1e3a5f", borderRadius:"8px", padding:"10px 14px", cursor:"pointer" },
  aTabOn: { background:"#0a2040", border:"1px solid #00d4ff", boxShadow:"0 0 8px rgba(0,212,255,.15)" },
  aCard: { background:"#0d1424", border:"1px solid #1e3a5f", borderRadius:"12px", padding:"16px", display:"flex", flexDirection:"column", gap:"12px" },
  secTip: { display:"flex", gap:"8px", alignItems:"flex-start", fontSize:"12px", color:"#ffa502", background:"rgba(255,165,2,.05)", border:"1px solid rgba(255,165,2,.2)", borderRadius:"6px", padding:"10px 12px", lineHeight:"1.4" },
  cItem: { display:"flex", gap:"12px", alignItems:"flex-start", cursor:"pointer", padding:"8px 10px", borderRadius:"6px", border:"1px solid transparent" },
  cItemOn: { background:"rgba(46,213,115,.05)", border:"1px solid rgba(46,213,115,.2)" },
  cBox: { width:"18px", height:"18px", border:"1px solid #2a4060", borderRadius:"4px", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center", fontSize:"11px", color:"#2ed573", marginTop:"1px" },
  cBoxOn: { background:"rgba(46,213,115,.2)", border:"1px solid #2ed573" },
  notesArea: { background:"#0d1424", border:"1px solid #1e3a5f", borderRadius:"8px", padding:"12px 14px", color:"#e0e0e0", fontSize:"13px", fontFamily:"'Sora',sans-serif", resize:"vertical", minHeight:"70px", outline:"none", width:"100%" },
  bugBtn: { background:"rgba(255,71,87,.1)", border:"1px solid rgba(255,71,87,.4)", borderRadius:"8px", padding:"12px", color:"#ff4757", fontSize:"11px", fontWeight:"700", letterSpacing:"2px", fontFamily:"'JetBrains Mono',monospace", cursor:"pointer", width:"100%" },
  bugForm: { background:"#0d1424", border:"1px solid rgba(255,71,87,.3)", borderRadius:"8px", padding:"12px", display:"flex", flexDirection:"column", gap:"10px" },
  bugInp: { background:"#060b14", border:"1px solid #1e3a5f", borderRadius:"6px", padding:"10px", color:"#e0e0e0", fontSize:"13px", fontFamily:"'Sora',sans-serif", outline:"none", resize:"none", minHeight:"60px", width:"100%" },
  bugCancel: { background:"transparent", border:"1px solid #2a4060", borderRadius:"6px", padding:"6px 14px", color:"#6b7a8d", fontSize:"12px", cursor:"pointer", fontFamily:"'Sora',sans-serif" },
  bugSave: { background:"rgba(255,71,87,.2)", border:"1px solid #ff4757", borderRadius:"6px", padding:"6px 14px", color:"#ff4757", fontSize:"12px", cursor:"pointer", fontFamily:"'Sora',sans-serif", fontWeight:"600" },
  bugTag: { background:"rgba(255,71,87,.08)", border:"1px solid rgba(255,71,87,.2)", borderRadius:"6px", padding:"8px 12px", fontSize:"12px", color:"#ff8090" },
  endBtn: { background:"transparent", border:"1px solid #1e3a5f", borderRadius:"8px", padding:"12px", color:"#6b7a8d", fontSize:"11px", letterSpacing:"2px", fontFamily:"'JetBrains Mono',monospace", cursor:"pointer" },
  statBox: { flex:1, background:"#0d1424", border:"1px solid #1e3a5f", borderRadius:"10px", padding:"14px", textAlign:"center" },
  proTipBox: { background:"rgba(0,212,255,.05)", border:"1px solid rgba(0,212,255,.2)", borderRadius:"10px", padding:"14px" },
  keyBtn: { background:"transparent", border:"none", color:"#2a4060", fontSize:"11px", cursor:"pointer", fontFamily:"'JetBrains Mono',monospace", textAlign:"right", padding:"0" },
};

function Header() {
  return (
    <div style={S.hdr}>
      <div style={S.logo}>
        <span style={S.logoMark}>◉</span>
        <span style={S.logoTxt}>QA Explorer</span>
      </div>
      <div style={S.tagline}>GUIA DE TESTE EXPLORATÓRIO COM IA</div>
    </div>
  );
}

function ApiKeyScreen({ onSave }) {
  const [key, setKey] = useState("");
  return (
    <div style={S.root}>
      <Header />
      <div style={S.card}>
        <div style={S.sec}>
          <div style={S.lbl}>CHAVE DE API ANTHROPIC</div>
          <p style={{ fontSize:"13px", color:"#8899aa", lineHeight:"1.6" }}>
            Para usar o app você precisa de uma chave de API da Anthropic. Ela fica salva só no seu dispositivo e nunca é enviada pra nenhum outro lugar.
          </p>
          <input
            style={S.inp}
            type="password"
            placeholder="sk-ant-api03-..."
            value={key}
            onChange={e => setKey(e.target.value)}
          />
          <p style={{ fontSize:"11px", color:"#4a5a6a" }}>
            Gere sua chave em platform.anthropic.com → API Keys
          </p>
        </div>
        <button
          style={{ ...S.startBtn, ...(key.length < 10 ? { opacity:.4, cursor:"not-allowed" } : {}) }}
          onClick={() => key.length >= 10 && onSave(key.trim())}
          disabled={key.length < 10}
        >
          SALVAR E CONTINUAR →
        </button>
      </div>
    </div>
  );
}

function App() {
  const [apiKey, setApiKey] = useState(() => localStorage.getItem(API_KEY_STORAGE) || "");
  const [phase, setPhase] = useState("setup");
  const [selApp, setSelApp] = useState("kraken");
  const [customName, setCustomName] = useState("");
  const [selPlat, setSelPlat] = useState(["ios"]);
  const [selFocus, setSelFocus] = useState("all");
  const [guide, setGuide] = useState(null);
  const [err, setErr] = useState(null);
  const [checked, setChecked] = useState({});
  const [notes, setNotes] = useState("");
  const [bugs, setBugs] = useState([]);
  const [bugOpen, setBugOpen] = useState(false);
  const [bugText, setBugText] = useState("");
  const [areaIdx, setAreaIdx] = useState(0);
  const [secs, setSecs] = useState(0);
  const intervalRef = useRef(null);

  const saveKey = (k) => { localStorage.setItem(API_KEY_STORAGE, k); setApiKey(k); };
  const clearKey = () => { localStorage.removeItem(API_KEY_STORAGE); setApiKey(""); };

  useEffect(() => {
    if (phase === "session") {
      intervalRef.current = setInterval(() => setSecs(s => s + 1), 1000);
    } else {
      clearInterval(intervalRef.current);
    }
    return () => clearInterval(intervalRef.current);
  }, [phase]);

  if (!apiKey) return <ApiKeyScreen onSave={saveKey} />;

  const fmt = s => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
  const togPlat = id => setSelPlat(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);
  const togCheck = (ai, qi) => { const k = `${ai}-${qi}`; setChecked(p => ({ ...p, [k]: !p[k] })); };

  const totalChecks = guide ? guide.areas.reduce((s, a) => s + a.checks.length, 0) : 0;
  const doneChecks = Object.values(checked).filter(Boolean).length;
  const pct = totalChecks > 0 ? Math.round((doneChecks / totalChecks) * 100) : 0;

  const generate = async () => {
    if (!selPlat.length) return;
    const appObj = KNOWN_APPS.find(a => a.id === selApp);
    const appName = selApp === "custom" ? (customName || "App") : appObj.name;
    const focusLabel = FOCUS_AREAS.find(f => f.id === selFocus)?.label;
    setPhase("loading"); setErr(null);

    try {
      const prompt = `Você é especialista em QA com foco em cibersegurança.

Gere um guia de sessão exploratória para:
App: ${appName}
Tipo: ${appObj?.type || "app"}
Plataformas: ${selPlat.join(", ")}
Foco: ${focusLabel}

Retorne APENAS JSON válido, sem markdown, sem blocos de código. Estrutura exata:
{"overview":"foco da sessão em 1-2 frases","areas":[{"name":"nome","risk":"alto","security_tip":"dica","checks":["c1","c2","c3","c4","c5"]}],"pro_tip":"dica avançada"}

Gere 4-5 áreas com 5 checks cada. Checks devem ser ações concretas e específicas para este app.`;

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 2000,
          messages: [{ role: "user", content: prompt }],
        }),
      });

      const data = await response.json();
      if (!data.content) throw new Error(data.error?.message || "Sem resposta");

      const text = data.content[0]?.text || "";
      const clean = text.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(clean);
      if (!parsed.areas) throw new Error("Formato inválido");

      setGuide({ ...parsed, appName, platforms: selPlat.join(" + ").toUpperCase() });
      setAreaIdx(0); setChecked({}); setPhase("session");
    } catch(e) {
      setErr(`Erro: ${e.message}`);
      setPhase("setup");
    }
  };

  const addBug = () => { if (!bugText.trim()) return; setBugs(p => [...p, bugText.trim()]); setBugText(""); setBugOpen(false); };
  const reset = () => { setPhase("setup"); setGuide(null); setChecked({}); setNotes(""); setBugs([]); setSecs(0); setAreaIdx(0); setBugOpen(false); setBugText(""); setErr(null); };

  // SETUP
  if (phase === "setup") return (
    <div style={S.root}>
      <Header />
      <div style={S.card}>
        <div style={S.sec}>
          <div style={S.lbl}>APP A TESTAR</div>
          <div style={S.appGrid}>
            {KNOWN_APPS.map(a => (
              <button key={a.id} style={{ ...S.appBtn, ...(selApp===a.id ? S.appBtnOn : {}) }} onClick={() => setSelApp(a.id)}>
                <span style={{ fontSize:"20px" }}>{a.emoji}</span>
                <span style={{ fontSize:"11px" }}>{a.name}</span>
              </button>
            ))}
          </div>
          {selApp === "custom" && (
            <input style={S.inp} placeholder="Nome do app..." value={customName} onChange={e => setCustomName(e.target.value)} />
          )}
        </div>
        <div style={S.sec}>
          <div style={S.lbl}>PLATAFORMA</div>
          <div style={S.chips}>
            {PLATFORMS.map(p => (
              <button key={p.id} style={{ ...S.chip, ...(selPlat.includes(p.id) ? S.chipOn : {}) }} onClick={() => togPlat(p.id)}>
                {p.label}
              </button>
            ))}
          </div>
        </div>
        <div style={S.sec}>
          <div style={S.lbl}>FOCO DA SESSÃO</div>
          <div style={S.chips}>
            {FOCUS_AREAS.map(f => (
              <button key={f.id} style={{ ...S.chip, ...(selFocus===f.id ? S.chipOn : {}) }} onClick={() => setSelFocus(f.id)}>
                {f.label}
              </button>
            ))}
          </div>
        </div>
        {err && <div style={S.errBox}>{err}</div>}
        <button style={{ ...S.startBtn, ...(selPlat.length===0 ? { opacity:.4, cursor:"not-allowed" } : {}) }} onClick={generate} disabled={!selPlat.length}>
          INICIAR SESSÃO →
        </button>
      </div>
      <button style={S.keyBtn} onClick={clearKey}>trocar chave de api</button>
    </div>
  );

  // LOADING
  if (phase === "loading") return (
    <div style={{ ...S.root, justifyContent:"center", alignItems:"center" }}>
      <div style={{ textAlign:"center", display:"flex", flexDirection:"column", alignItems:"center", gap:"18px" }}>
        <div style={S.spinner} className="spin" />
        <div style={{ fontSize:"15px", color:"#e0e0e0" }}>Gerando seu guia...</div>
        <div style={{ fontSize:"11px", color:"#6b7a8d", fontFamily:"'JetBrains Mono',monospace", letterSpacing:"1px" }}>MAPEANDO ÁREAS DE RISCO</div>
      </div>
    </div>
  );

  // SESSION
  if (phase === "session" && guide) {
    const si = Math.min(areaIdx, guide.areas.length - 1);
    const area = guide.areas[si];
    const areaDone = area.checks.filter((_,i) => checked[`${si}-${i}`]).length;

    return (
      <div style={S.root}>
        <div style={S.topBar}>
          <div>
            <div style={{ fontSize:"15px", fontWeight:"700", color:"#fff" }}>{guide.appName}</div>
            <div style={{ fontSize:"10px", color:"#6b7a8d", fontFamily:"'JetBrains Mono',monospace", marginTop:"2px" }}>{guide.platforms}</div>
          </div>
          <div style={S.timerDisp}>{fmt(secs)}</div>
          <div style={{ textAlign:"right" }}>
            <div style={{ fontSize:"16px", fontWeight:"700", color:"#00d4ff", fontFamily:"'JetBrains Mono',monospace" }}>{pct}%</div>
            <div style={{ fontSize:"10px", color:"#6b7a8d" }}>coberto</div>
          </div>
        </div>
        <div style={S.progTrack}><div style={{ ...S.progFill, width:`${pct}%` }} /></div>
        <div style={S.overviewBox}><span style={{ color:"#00d4ff", flexShrink:0 }}>◈</span>{guide.overview}</div>

        <div style={{ display:"flex", flexDirection:"column", gap:"6px" }}>
          {guide.areas.map((a, i) => {
            const done = a.checks.filter((_,qi) => checked[`${i}-${qi}`]).length;
            return (
              <button key={i} style={{ ...S.aTab, ...(si===i ? S.aTabOn : {}) }} onClick={() => setAreaIdx(i)}>
                <div style={{ display:"flex", alignItems:"center", gap:"8px" }}>
                  <span style={{ fontSize:"13px", color: si===i ? "#fff" : "#8899aa" }}>{a.name}</span>
                  {done > 0 && <span style={{ fontSize:"10px", color:"#2ed573", fontFamily:"'JetBrains Mono',monospace" }}>{done}/{a.checks.length}</span>}
                </div>
                <span style={{ fontSize:"10px", letterSpacing:"1px", fontFamily:"'JetBrains Mono',monospace", padding:"2px 8px", borderRadius:"4px", fontWeight:"600",
                  ...(a.risk==="alto" ? { background:"rgba(255,71,87,.15)", color:"#ff4757" } : a.risk==="médio" ? { background:"rgba(255,165,2,.15)", color:"#ffa502" } : { background:"rgba(46,213,115,.15)", color:"#2ed573" })
                }}>{a.risk}</span>
              </button>
            );
          })}
        </div>

        <div style={S.aCard} key={si}>
          <div style={S.secTip}><span style={{ flexShrink:0 }}>⚡</span><span>{area.security_tip}</span></div>
          <div style={{ fontSize:"11px", color:"#6b7a8d", fontFamily:"'JetBrains Mono',monospace" }}>{areaDone}/{area.checks.length} VERIFICAÇÕES</div>
          <div style={{ display:"flex", flexDirection:"column", gap:"8px" }}>
            {area.checks.map((c, qi) => {
              const k = `${si}-${qi}`; const on = !!checked[k];
              return (
                <div key={qi} style={{ ...S.cItem, ...(on ? S.cItemOn : {}) }} onClick={() => togCheck(si, qi)}>
                  <div style={{ ...S.cBox, ...(on ? S.cBoxOn : {}) }}>{on ? "✓" : ""}</div>
                  <span style={{ fontSize:"13px", color: on ? "#6b7a8d" : "#c0d0e0", lineHeight:"1.4", textDecoration: on ? "line-through" : "none" }}>{c}</span>
                </div>
              );
            })}
          </div>
        </div>

        <textarea style={S.notesArea} placeholder="Anote o que você observar..." value={notes} onChange={e => setNotes(e.target.value)} />

        {bugOpen ? (
          <div style={S.bugForm}>
            <textarea style={S.bugInp} placeholder="Descreva o bug brevemente..." value={bugText} onChange={e => setBugText(e.target.value)} autoFocus />
            <div style={{ display:"flex", gap:"8px", justifyContent:"flex-end" }}>
              <button style={S.bugCancel} onClick={() => setBugOpen(false)}>cancelar</button>
              <button style={S.bugSave} onClick={addBug}>salvar bug</button>
            </div>
          </div>
        ) : (
          <button style={S.bugBtn} onClick={() => setBugOpen(true)}>⚠ ENCONTREI UM BUG</button>
        )}

        {bugs.length > 0 && (
          <div style={{ display:"flex", flexDirection:"column", gap:"6px" }}>
            {bugs.map((b, i) => <div key={i} style={S.bugTag}>⚠ {b}</div>)}
          </div>
        )}
        <button style={S.endBtn} onClick={() => setPhase("end")}>ENCERRAR SESSÃO</button>
      </div>
    );
  }

  // END
  if (phase === "end") return (
    <div style={S.root}>
      <div style={{ textAlign:"center", padding:"16px 0 8px" }}>
        <div style={{ fontSize:"20px", fontWeight:"700", color:"#fff", marginBottom:"4px" }}>Sessão encerrada</div>
        <div style={{ fontSize:"13px", color:"#00d4ff", fontFamily:"'JetBrains Mono',monospace" }}>{fmt(secs)} · {guide?.appName}</div>
      </div>
      <div style={{ display:"flex", gap:"10px" }}>
        {[{ n:doneChecks, l:"verificações" }, { n:bugs.length, l:"bugs" }, { n:`${pct}%`, l:"cobertura" }].map((st,i) => (
          <div key={i} style={S.statBox}>
            <div style={{ fontSize:"26px", fontWeight:"700", color:"#00d4ff", fontFamily:"'JetBrains Mono',monospace" }}>{st.n}</div>
            <div style={{ fontSize:"11px", color:"#6b7a8d", marginTop:"4px" }}>{st.l}</div>
          </div>
        ))}
      </div>
      {guide?.pro_tip && (
        <div style={S.proTipBox}>
          <div style={{ fontSize:"10px", color:"#00d4ff", fontFamily:"'JetBrains Mono',monospace", letterSpacing:"2px", marginBottom:"8px" }}>PRO TIP</div>
          <div style={{ fontSize:"13px", color:"#b0c0d0", lineHeight:"1.5" }}>{guide.pro_tip}</div>
        </div>
      )}
      {bugs.length > 0 && (
        <div style={{ ...S.card, gap:"10px", borderColor:"rgba(255,71,87,.25)" }}>
          <div style={{ fontSize:"10px", color:"#ff4757", fontFamily:"'JetBrains Mono',monospace", letterSpacing:"2px" }}>BUGS ENCONTRADOS</div>
          {bugs.map((b,i) => (
            <div key={i} style={{ display:"flex", gap:"12px", fontSize:"13px", color:"#c0d0e0", alignItems:"flex-start" }}>
              <span style={{ fontFamily:"'JetBrains Mono',monospace", color:"#ff4757", fontWeight:"700", flexShrink:0 }}>{i+1}</span>
              <span>{b}</span>
            </div>
          ))}
        </div>
      )}
      {notes && (
        <div style={S.card}>
          <div style={{ fontSize:"10px", color:"#6b7a8d", fontFamily:"'JetBrains Mono',monospace", letterSpacing:"2px", marginBottom:"8px" }}>ANOTAÇÕES</div>
          <div style={{ fontSize:"13px", color:"#8899aa", lineHeight:"1.6", whiteSpace:"pre-wrap" }}>{notes}</div>
        </div>
      )}
      <button style={S.startBtn} onClick={reset}>NOVA SESSÃO</button>
    </div>
  );

  return null;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
